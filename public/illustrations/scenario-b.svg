<svg width="400" height="240" viewBox="0 0 400 240" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="400" height="240" fill="oklch(0.145 0.005 50)"/>
  <defs>
    <filter id="haze-b" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="15" />
    </filter>
    <linearGradient id="fade-b" x1="200" y1="200" x2="200" y2="40" gradientUnits="userSpaceOnUse">
      <stop stop-color="white" />
      <stop offset="1" stop-color="white" stop-opacity="0" />
    </linearGradient>
    <mask id="mask-fade-b">
      <rect width="400" height="240" fill="url(#fade-b)" />
    </mask>
  </defs>

  <!-- Haze Abstraction -->
  <circle cx="200" cy="140" r="60" fill="oklch(0.55 0.008 60)" fill-opacity="0.08" filter="url(#haze-b)"/>
  <circle cx="160" cy="100" r="40" fill="oklch(0.55 0.008 60)" fill-opacity="0.04" filter="url(#haze-b)"/>
  <circle cx="240" cy="100" r="40" fill="oklch(0.55 0.008 60)" fill-opacity="0.04" filter="url(#haze-b)"/>

  <!-- Diverging Paths -->
  <g mask="url(#mask-fade-b)">
    <path d="M200 180 L80 60" stroke="oklch(0.55 0.008 60)" stroke-width="1" stroke-dasharray="4 6"/>
    <path d="M200 180 L320 60" stroke="oklch(0.55 0.008 60)" stroke-width="1" stroke-dasharray="4 6"/>
    <path d="M200 240 L200 180" stroke="oklch(0.55 0.008 60)" stroke-width="1" stroke-dasharray="2 4"/>
  </g>

  <!-- Pause Symbol at Junction -->
  <g transform="translate(200, 180)">
    <rect x="-3.5" y="-6" width="2.5" height="12" fill="oklch(0.82 0.15 85)"/>
    <rect x="1" y="-6" width="2.5" height="12" fill="oklch(0.82 0.15 85)"/>
  </g>

  <!-- Perspective Anchor -->
  <circle cx="200" cy="180" r="1.5" fill="oklch(0.55 0.008 60)" fill-opacity="0.3"/>
</svg>
